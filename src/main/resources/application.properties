# ===== Server =====
server.port=8080

# ===== Database: H2 in-memory (DEFAULT - no installation needed) =====
spring.datasource.url=jdbc:h2:mem:expensetracker;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Browse the database at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:expensetracker)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Readable ISO dates in JSON
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== To use MySQL instead, comment the H2 block above and uncomment below =====
# spring.datasource.url=jdbc:mysql://localhost:3306/expensetracker?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=YOUR_PASSWORD
# spring.jpa.hibernate.ddl-auto=update
